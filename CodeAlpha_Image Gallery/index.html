<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>

<!-- FILTER BUTTONS -->
<div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="images/img1.jpg" class="image nature" onclick="openLightbox(this)">
    <img src="images/img2.jpg" class="image city" onclick="openLightbox(this)">
    <img src="images/img3.jpg" class="image nature" onclick="openLightbox(this)">
    <img src="images/img4.jpg" class="image city" onclick="openLightbox(this)">
    <img src="images/img5.jpg" class="image nature" onclick="openLightbox(this)">
    <img src="images/img6.jpg" class="image city" onclick="openLightbox(this)">
    
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <img id="lightbox-img">
    <div class="nav">
        <button onclick="prevImage()">❮</button>
        <button onclick="nextImage()">❯</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
